<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/admin_user_list.css}"/>
</head>
<body>

<div class="admin-container">

    <div class="admin-header">
        <h1>👥 Quản lý người dùng</h1>
        <a th:href="@{/home}" class="btn-home">← Về trang chủ</a>
    </div>

    <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>
    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>

    <!-- Ô TÌM KIẾM -->
    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchEmail" placeholder="Tìm kiếm theo email..." autocomplete="off"/>
        <button type="button" id="clearSearchBtn" class="btn-clear">✕</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Họ tên</th>
            <th>Email</th>
            <th>Trạng thái</th>
            <th>Phân quyền</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody id="userTableBody">
        <tr th:each="user : ${users}" th:attr="data-email=${user.email}">
            <td th:text="${user.userId}">1</td>
            <td th:text="${user.fullName}">Họ tên</td>
            <td th:text="${user.email}">email@example.com</td>
            <td>
                <span class="status-badge"
                      th:classappend="${user.status == 'ACTIVE' ? 'status-active' : (user.status == 'PENDING' ? 'status-pending' : 'status-locked')}"
                      th:text="${user.status}">ACTIVE</span>
            </td>

            <td>
                <form method="post" th:action="@{/admin/users/change-role}" style="display:flex;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="userId" th:value="${user.userId}"/>
                    <select name="roleId" class="role-select">
                        <option th:each="role : ${roles}"
                                th:value="${role.roleId}"
                                th:text="${role.roleName}"
                                th:selected="${role.roleId == user.role.roleId}">
                        </option>
                    </select>
                    <button type="submit" class="btn-save">Lưu</button>
                </form>
            </td>

            <td>
                <form method="post" th:action="@{/admin/users/toggle-status}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="userId" th:value="${user.userId}"/>
                    <button type="submit"
                            th:class="${user.status == 'LOCKED' ? 'btn-toggle btn-unlock' : 'btn-toggle btn-lock'}"
                            th:text="${user.status == 'LOCKED' ? '🔓 Mở khóa' : '🔒 Khóa'}">
                    </button>
                </form>
            </td>
        </tr>

        <!-- Dòng hiện khi không tìm thấy kết quả -->
        <tr id="noResultRow" style="display:none;">
            <td colspan="6" style="text-align:center; color:#999; padding:30px;">
                Không tìm thấy người dùng nào phù hợp 😢
            </td>
        </tr>
        </tbody>
    </table>

</div>

<script th:src="@{/js/admin_user_list.js}"></script>
</body>
</html>
