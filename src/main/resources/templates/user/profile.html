<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}"/>
</head>
<body>

<div class="profile-container">

    <!-- HEADER -->
    <div class="profile-avatar-wrapper">
        <!-- Hiện ảnh nếu có, không thì hiện chữ cái đầu -->
        <div class="profile-avatar">
            <img th:if="${user.avatar != null}" th:src="${user.avatar}" alt="avatar"/>
            <span th:unless="${user.avatar != null}"
                  th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
        </div>

        <!-- Form upload riêng, ẩn input, click vào icon camera để mở -->
        <form method="post" th:action="@{/profile/update}" enctype="multipart/form-data" id="avatarForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="file" name="avatarFile" id="avatarInput" accept="image/*"
                   style="display:none" onchange="document.getElementById('avatarForm').submit()"/>
            <label for="avatarInput" class="avatar-edit-icon">📷</label>
        </form>
    </div>

    <!-- THÔNG BÁO -->
    <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>
    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>

    <!-- FORM CHỈNH SỬA -->
    <form method="post" th:action="@{/profile/update}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="profile-body">

            <div class="profile-field">
                <div class="profile-field-icon">👤</div>
                <div class="profile-field-info">
                    <div class="profile-field-label">Họ và tên</div>
                    <label>
                        <input type="text" name="fullName" class="profile-field-value-input"
                               th:value="${user.fullName}" required/>
                    </label>
                </div>
            </div>

            <div class="profile-field">
                <div class="profile-field-icon">🆔</div>
                <div class="profile-field-info">
                    <div class="profile-field-label">Tên đăng nhập</div>
                    <label>
                        <input type="text" name="username" class="profile-field-value-input"
                               th:value="${user.username}" placeholder="Chưa cập nhật"/>
                    </label>
                </div>
            </div>

            <!-- EMAIL - KHÔNG CHO SỬA -->
            <div class="profile-field">
                <div class="profile-field-icon">📧</div>
                <div class="profile-field-info">
                    <div class="profile-field-label">Email</div>
                    <label>
                        <input type="email" class="profile-field-value-input"
                               th:value="${user.email}" disabled/>
                    </label>
                </div>
            </div>

            <div class="profile-field">
                <div class="profile-field-icon">📱</div>
                <div class="profile-field-info">
                    <div class="profile-field-label">Số điện thoại</div>
                    <label>
                        <input type="text" name="phone" class="profile-field-value-input"
                               th:value="${user.phone}" placeholder="Chưa cập nhật"/>
                    </label>
                </div>
            </div>

            <div class="profile-field">
                <div class="profile-field-icon">🏠</div>
                <div class="profile-field-info">
                    <div class="profile-field-label">Địa chỉ</div>
                    <label>
                        <input type="text" name="address" class="profile-field-value-input"
                               th:value="${user.address}" placeholder="Chưa cập nhật"/>
                    </label>
                </div>
            </div>

            <div class="profile-field">
                <div class="profile-field-icon">📅</div>
                <div class="profile-field-info">
                    <div class="profile-field-label">Ngày tham gia</div>
                    <label>
                        <input type="text" class="profile-field-value-input"
                               th:value="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}" disabled/>
                    </label>
                </div>
            </div>
        </div>
                <!-- ACTIONS -->
        <div class="profile-actions">
            <button type="submit" class="btn-update">💾 Cập nhật thông tin</button>
        </div>
    </form>
    <div class="profile-actions" style="padding-top: 0;">
        <a th:href="@{/profile/change-password}" class="btn-change-password">
            🔐 Đổi mật khẩu
        </a>
    </div>
    <div class="profile-actions" style="padding-top: 0;">
        <a th:href="@{/home}" class="btn-back">← Về trang chủ</a>
    </div>
</div>

</body>
</html>
