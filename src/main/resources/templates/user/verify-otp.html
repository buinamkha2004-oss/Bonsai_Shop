<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận OTP - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>
<div class="login-container">
    <div class="login-logo">
        <div style="font-size:50px">🔑</div>
        <h1>Nhập mã OTP</h1>
        <p th:text="'Mã OTP đã gửi đến: ' + ${email}"></p>
    </div>

    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>
    <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>


    <form method="post" th:action="@{/verify-otp}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="email" th:value="${email}"/> <!-- ← quan trọng -->

        <div class="form-group">
            <label>🔢 Mã OTP (6 số)</label>
            <input type="text" name="otpCode" placeholder="Nhập mã OTP"
                   maxlength="6" required
                   style="letter-spacing: 8px; font-size: 22px; text-align:center;"/>
        </div>
        <button type="submit" class="btn-login">Xác nhận OTP</button>
    </form>


    <div class="register-link" style="margin-top:15px">
        <form method="post" th:action="@{/resend-otp}" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="email" th:value="${email}"/>
            <button type="submit"
                    style="background:none; border:none; color:#2d6a4f;
                       cursor:pointer; font-size:14px; text-decoration:underline;">
                🔄 Gửi lại OTP
            </button>
        </form>
    </div>
</div>
</body>
</html>
