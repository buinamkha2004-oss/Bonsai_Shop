<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/register.css}"/>
</head>
<body>

<div class="register-container">

    <!-- LOGO -->
    <div class="register-logo">
        <div style="font-size: 50px;">🌿</div>
        <h1>Bonsai Shop</h1>
        <p>Tạo tài khoản mới</p>
    </div>

    <!-- THÔNG BÁO -->
    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>
    <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>

    <!-- FORM -->
    <form method="post" th:action="@{/register}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <label>👤 Họ tên</label>
            <input type="text" id="fullName" name="fullName"
                   placeholder="Nhập họ tên của bạn" required/>
            <div class="error-msg" id="fullNameError"></div>
        </div>

        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="email" name="email"
                   placeholder="Nhập email của bạn" required/>
            <div class="error-msg" id="emailError"></div>
        </div>

        <div class="form-group">
            <label>🔒 Mật khẩu</label>
            <div class="input-wrapper">
                <input type="password" id="password" name="password"
                       placeholder="Nhập mật khẩu" required/>
                <span class="toggle-password" id="togglePassword">👁️</span>
            </div>
            <div class="password-strength">
                <div class="password-strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="form-group">
            <label>📱 Số điện thoại</label>
            <input type="text" id="phone" name="phone"
                   placeholder="Nhập số điện thoại (không bắt buộc)"/>
            <div class="error-msg" id="phoneError"></div>
        </div>

        <button type="submit" class="btn-register">Đăng ký</button>
    </form>

    <div class="login-link">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
    </div>

</div>

<script th:src="@{/js/register.js}"></script>
</body>
</html>
