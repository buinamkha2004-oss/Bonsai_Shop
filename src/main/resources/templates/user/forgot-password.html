<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>
<div class="login-container">
    <div class="login-logo">
        <div style="font-size:50px">🌿</div>
        <h1>Quên mật khẩu</h1>
        <p>Nhập email để nhận mã OTP</p>
    </div>

    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>
    <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>

    <form method="post" th:action="@{/forgot-password}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label>📧 Email</label>
            <label>
                <input type="email" name="email" placeholder="Nhập email của bạn" required/>
            </label>
        </div>
        <button type="submit" class="btn-login">Gửi mã OTP</button>
    </form>

    <div class="register-link" style="margin-top:15px">
        <a th:href="@{/login}">← Quay lại đăng nhập</a>
    </div>
</div>
</body>
</html>
