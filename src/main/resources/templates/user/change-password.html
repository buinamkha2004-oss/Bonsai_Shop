<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body>

<div class="profile-container">

    <h2 style="text-align:center; color:#2d6a4f; margin-bottom:25px;">
        🔐 Đổi mật khẩu
    </h2>

    <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>
    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>

    <form method="post" th:action="@{/profile/change-password}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="profile-field">
            <div class="profile-field-icon">🔑</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Mật khẩu hiện tại</div>
                <label>
                    <input type="password" name="currentPassword"
                           class="profile-field-value-input" required>
                </label>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-field-icon">🆕</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Mật khẩu mới</div>
                <label>
                    <input type="password" name="newPassword"
                           class="profile-field-value-input" required>
                </label>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-field-icon">✅</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Xác nhận mật khẩu mới</div>
                <label>
                    <input type="password" name="confirmPassword"
                           class="profile-field-value-input" required>
                </label>
            </div>
        </div>

        <div class="profile-actions">
            <button type="submit" class="btn-update">
                💾 Lưu mật khẩu mới
            </button>
        </div>
    </form>

    <div class="profile-actions" style="padding-top:0;">
        <a th:href="@{/profile}" class="btn-back">← Quay lại hồ sơ</a>
    </div>

</div>

</body>
</html>
