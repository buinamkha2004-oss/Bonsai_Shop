<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}"/>
</head>
<body>

<div class="profile-container">

    <!-- HEADER -->
    <div class="profile-header">
        <div class="profile-avatar">
            <img th:if="${user.avatar != null}" th:src="${user.avatar}" alt="avatar"/>
            <span th:unless="${user.avatar != null}"
                  th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
        </div>
        <h2 th:text="${user.fullName}">Họ tên</h2>
        <p th:text="${user.email}">email@example.com</p>
        <span class="profile-status" th:text="${user.status}">ACTIVE</span>
    </div>

    <!-- THÔNG BÁO -->
    <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>
    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>

    <!-- BODY - CHỈ XEM -->
    <div class="profile-body">

        <div class="profile-field">
            <div class="profile-field-icon">👤</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Họ và tên</div>
                <div class="profile-field-value" th:text="${user.fullName}">-</div>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-field-icon">🆔</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Tên đăng nhập</div>
                <div class="profile-field-value"
                     th:text="${user.username != null ? user.username : 'Chưa cập nhật'}">-</div>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-field-icon">📧</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Email</div>
                <div class="profile-field-value" th:text="${user.email}">-</div>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-field-icon">📱</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Số điện thoại</div>
                <div class="profile-field-value"
                     th:text="${user.phone != null ? user.phone : 'Chưa cập nhật'}">-</div>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-field-icon">🏠</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Địa chỉ</div>
                <div class="profile-field-value"
                     th:text="${user.address != null ? user.address : 'Chưa cập nhật'}">-</div>
            </div>
        </div>

        <div class="profile-field">
            <div class="profile-field-icon">📅</div>
            <div class="profile-field-info">
                <div class="profile-field-label">Ngày tham gia</div>
                <div class="profile-field-value"
                     th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">-</div>
            </div>
        </div>

    </div>

    <!-- ACTIONS -->
    <div class="profile-actions">
        <a th:href="@{/profile/update}" class="btn-update">✏️ Chỉnh sửa thông tin</a>
    </div>
    <div class="profile-actions" style="padding-top: 0;">
        <a th:href="@{/profile/change-password}" class="btn-change-password">🔐 Đổi mật khẩu</a>
    </div>
    <div class="profile-actions" style="padding-top: 0;">
        <a th:href="@{/home}" class="btn-back">← Về trang chủ</a>
    </div>

</div>

</body>
</html>
