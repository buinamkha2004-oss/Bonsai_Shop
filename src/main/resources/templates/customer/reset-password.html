<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - Bonsai Shop</title>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>
<div class="login-container">
    <div class="login-logo">
        <div style="font-size:50px">🔒</div>
        <h1>Đặt lại mật khẩu</h1>
        <p>Nhập mật khẩu mới của bạn</p>
    </div>

    <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>

    <form method="post" th:action="@{/reset-password}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="email" th:value="${email}"/>

        <div class="form-group">
            <label>🔒 Mật khẩu mới</label>
            <label>
                <input type="password" name="newPassword" placeholder="Nhập mật khẩu mới" required/>
            </label>
        </div>

        <div class="form-group">
            <label>🔒 Xác nhận mật khẩu</label>
            <label>
                <input type="password" name="confirmPassword" placeholder="Nhập lại mật khẩu" required/>
            </label>
        </div>

        <button type="submit" class="btn-login">Đặt lại mật khẩu</button>
    </form>
</div>
</body>
</html>
